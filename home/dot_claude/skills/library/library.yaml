default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: obsidian-bases
      description: Create and edit Obsidian Bases (.base files) with views, filters, formulas, and summaries
      source: https://github.com/kepano/obsidian-skills/blob/main/skills/obsidian-bases/SKILL.md

    - name: obsidian-cli
      description: Interact with Obsidian vaults using the Obsidian CLI — read, create, search, manage notes and properties
      source: https://github.com/kepano/obsidian-skills/blob/main/skills/obsidian-cli/SKILL.md

  # Plugins are managed by the Claude Code plugin system.
  # /library use <name> runs the install command. /library sync re-installs all.
  plugins:
    - name: context7
      marketplace: claude-plugins-official
      description: Library documentation MCP — fetch up-to-date docs for any library
      install: "claude plugin install context7@claude-plugins-official"

    - name: supabase
      marketplace: claude-plugins-official
      description: Supabase MCP — manage projects, run queries, interact with Supabase services
      install: "claude plugin install supabase@claude-plugins-official"

    - name: superpowers
      marketplace: claude-plugins-official
      description: Core skills library — TDD, debugging, planning, brainstorming, collaboration patterns
      install: "claude plugin install superpowers@claude-plugins-official"

  agents: []
  prompts: []
